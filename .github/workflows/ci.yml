name: Python CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Test
        run: pytest

      - name: Dependency vulnerability audit
        run: pip-audit

      - name: Static security analysis
        run: bandit -r src -ll

      - name: Build container image
        run: docker build -t aws-python-platform-template:ci .

      - name: Scan container image (high/critical)
        uses: aquasecurity/trivy-action@0.25.0
        with:
          image-ref: aws-python-platform-template:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

      - name: Generate OpenAPI artifact
        run: |
          python -c "import json; from platform_service.main import app; print(json.dumps(app.openapi(), indent=2))" > openapi.json

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: openapi.json
